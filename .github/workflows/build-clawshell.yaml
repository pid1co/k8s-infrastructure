name: Build ClawShell Container

on:
  workflow_dispatch:
  schedule:
    # Weekly builds to pick up upstream changes
    - cron: '0 6 * * 0'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  build-clawshell:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout this repo (for Dockerfile)
        uses: actions/checkout@v6
        with:
          path: infrastructure

      - name: Checkout ClawShell
        uses: actions/checkout@v6
        with:
          repository: clawshell/clawshell
          path: clawshell

      - name: Copy Dockerfile to ClawShell context
        run: cp infrastructure/.github/dockerfiles/clawshell.Dockerfile clawshell/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/clawshell
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push ClawShell
        uses: docker/build-push-action@v7
        with:
          context: ./clawshell
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
