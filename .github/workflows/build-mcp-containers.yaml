name: Build MCP Containers

on:
  workflow_dispatch:
    inputs:
      build_fmp:
        description: 'Build FMP MCP Server'
        required: false
        type: boolean
        default: true
      build_forexfactory:
        description: 'Build ForexFactory MCP Server'
        required: false
        type: boolean
        default: true
  schedule:
    # Weekly builds to pick up upstream changes
    - cron: '0 6 * * 0'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  build-fmp-mcp:
    if: ${{ github.event_name == 'schedule' || inputs.build_fmp }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout upstream FMP MCP Server
        uses: actions/checkout@v6
        with:
          repository: imbenrabi/Financial-Modeling-Prep-MCP-Server
          path: fmp-mcp

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/fmp-mcp-server
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push FMP MCP Server
        uses: docker/build-push-action@v7
        with:
          context: ./fmp-mcp
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  build-forexfactory-mcp:
    if: ${{ github.event_name == 'schedule' || inputs.build_forexfactory }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout upstream ForexFactory MCP Server
        uses: actions/checkout@v6
        with:
          repository: kjpou1/forexfactory-mcp
          path: forexfactory-mcp

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/forexfactory-mcp-server
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push ForexFactory MCP Server
        uses: docker/build-push-action@v7
        with:
          context: ./forexfactory-mcp
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
