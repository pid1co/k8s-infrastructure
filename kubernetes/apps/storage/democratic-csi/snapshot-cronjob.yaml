---
# Nightly VolumeSnapshot CronJob for all config PVCs
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightly-snapshots
  namespace: democratic-csi
spec:
  schedule: "0 2 * * *"  # Run at 2:00 AM daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: snapshot-creator
          restartPolicy: OnFailure
          containers:
            - name: snapshot-creator
              image: bitnami/kubectl:latest
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)

                  # Define namespaces and PVCs to snapshot
                  declare -A PVCS=(
                    ["media"]="sonarr-config radarr-config radarr-4k-config plex-config nzbget-config prowlarr-config bazarr-config bazarr-4k-config overseerr-config notifiarr-config"
                    ["authentik"]="authentik"
                    ["paperless"]="paperless-data paperless-consume"
                    ["homepage"]="homepage-config"
                    ["immich"]="immich-ml-cache"
                    ["linkwarden"]="linkwarden-data linkwarden-meili-data"
                    ["mealie"]="mealie-data"
                    ["romm"]="romm-config"
                    ["snippet-box"]="snippet-box-data"
                    ["openclaw-trading"]="openclaw-trading-workspace"
                    ["openclaw-personal"]="openclaw-personal-workspace"
                    ["openclaw-signals"]="openclaw-signals-workspace"
                  )

                  for NS in "${!PVCS[@]}"; do
                    for PVC in ${PVCS[$NS]}; do
                      # Check if PVC exists
                      if kubectl get pvc -n $NS $PVC &>/dev/null; then
                        echo "Creating snapshot for $NS/$PVC..."
                        cat <<EOF | kubectl apply -f -
                  apiVersion: snapshot.storage.k8s.io/v1
                  kind: VolumeSnapshot
                  metadata:
                    name: ${PVC}-${TIMESTAMP}
                    namespace: $NS
                  spec:
                    volumeSnapshotClassName: truenas-nfs-snapclass
                    source:
                      persistentVolumeClaimName: $PVC
                  EOF
                        echo "Created snapshot ${PVC}-${TIMESTAMP} in $NS"
                      else
                        echo "PVC $PVC not found in namespace $NS, skipping..."
                      fi
                    done
                  done

                  echo "Snapshot creation complete!"
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: snapshot-creator
  namespace: democratic-csi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: snapshot-creator
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["create", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: snapshot-creator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: snapshot-creator
subjects:
  - kind: ServiceAccount
    name: snapshot-creator
    namespace: democratic-csi
