---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fmp-mcp-policy
  namespace: mcp-servers
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: fmp-mcp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow all traffic to MCP port (health checks + API calls)
    # More restrictive rules can be added later if needed
    - ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # FMP API
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
