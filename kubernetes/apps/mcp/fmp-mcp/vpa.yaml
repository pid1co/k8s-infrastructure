---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: fmp-mcp
  namespace: mcp-servers
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fmp-mcp
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: fmp-mcp
        minAllowed:
          cpu: 25m
          memory: 32Mi
        maxAllowed:
          cpu: 200m
          memory: 256Mi
