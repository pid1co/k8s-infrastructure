---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fmp-mcp
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: fmp-mcp
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fmp-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fmp-mcp
        app.kubernetes.io/component: mcp-server
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: fmp-mcp
          image: ghcr.io/pid1co/fmp-mcp-server:latest
          env:
            - name: FMP_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fmp-mcp-secrets
                  key: fmp-api-key
            - name: PORT
              value: "8080"
            - name: DYNAMIC_TOOL_DISCOVERY
              value: "true"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fmp-mcp
  namespace: mcp-servers
spec:
  selector:
    app.kubernetes.io/name: fmp-mcp
  ports:
    - name: http
      port: 8080
      targetPort: http
