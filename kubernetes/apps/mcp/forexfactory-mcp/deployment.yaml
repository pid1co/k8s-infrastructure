---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forexfactory-mcp
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: forexfactory-mcp
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forexfactory-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forexfactory-mcp
        app.kubernetes.io/component: mcp-server
    spec:
      containers:
        - name: forexfactory-mcp
          image: ghcr.io/your-org/forexfactory-mcp-server:latest
          env:
            - name: MCP_SERVER_PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: forexfactory-mcp
  namespace: mcp-servers
spec:
  selector:
    app.kubernetes.io/name: forexfactory-mcp
  ports:
    - name: http
      port: 8080
      targetPort: http
