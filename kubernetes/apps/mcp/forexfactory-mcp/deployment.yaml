---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forexfactory-mcp
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: forexfactory-mcp
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forexfactory-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forexfactory-mcp
        app.kubernetes.io/component: mcp-server
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: forexfactory-mcp
          image: ghcr.io/pid1co/forexfactory-mcp-server:latest
          command: ["uv", "run", "ffcal-server"]
          args: ["--transport", "http", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: forexfactory-mcp
  namespace: mcp-servers
spec:
  selector:
    app.kubernetes.io/name: forexfactory-mcp
  ports:
    - name: http
      port: 8080
      targetPort: http
