---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forexfactory-mcp
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: forexfactory-mcp
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forexfactory-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forexfactory-mcp
        app.kubernetes.io/component: mcp-server
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      initContainers:
        - name: install-playwright
          image: ghcr.io/pid1co/forexfactory-mcp-server:latest
          command:
            - sh
            - -c
            - |
              playwright install chromium
              echo "Playwright browsers installed"
          volumeMounts:
            - name: playwright-cache
              mountPath: /root/.cache/ms-playwright
      containers:
        - name: forexfactory-mcp
          image: ghcr.io/pid1co/forexfactory-mcp-server:latest
          args: ["--transport", "http", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: playwright-cache
              mountPath: /root/.cache/ms-playwright
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: playwright-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: forexfactory-mcp
  namespace: mcp-servers
spec:
  selector:
    app.kubernetes.io/name: forexfactory-mcp
  ports:
    - name: http
      port: 8080
      targetPort: http
