---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-mcp-secrets
  namespace: observability
spec:
  refreshInterval: 4h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: grafana-mcp-secrets
    creationPolicy: Owner
  data:
    - secretKey: service-account-token
      remoteRef:
        key: Grafana MCP
        property: service_account_token
