---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-mcp
  namespace: observability
  labels:
    app.kubernetes.io/name: grafana-mcp
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana-mcp
        app.kubernetes.io/component: mcp-server
    spec:
      containers:
        - name: grafana-mcp
          image: grafana/mcp-grafana:latest
          args:
            - "-t"
            - "streamable-http"
            - "-addr"
            - ":8000"
          env:
            - name: GRAFANA_URL
              value: "http://grafana.observability.svc:3000"
            - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: grafana-mcp-secrets
                  key: service-account-token
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-mcp
  namespace: observability
spec:
  selector:
    app.kubernetes.io/name: grafana-mcp
  ports:
    - name: http
      port: 8000
      targetPort: http
