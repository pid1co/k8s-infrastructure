---
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: observability
  labels:
    dashboards: grafana
spec:
  config:
    log:
      mode: console
    auth:
      disable_login_form: "false"
    server:
      root_url: https://grafana.pid1.co
    rendering:
      server_url: http://localhost:8081/render
      callback_url: http://localhost:3000/
  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana-image-renderer
              image: grafana/grafana-image-renderer:latest
              ports:
                - containerPort: 8081
                  name: renderer
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 512Mi
              env:
                - name: ENABLE_METRICS
                  value: "true"
  service:
    spec:
      type: ClusterIP
      ports:
        - name: grafana
          port: 3000
          targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
