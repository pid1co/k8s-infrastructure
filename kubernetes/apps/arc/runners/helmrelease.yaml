---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-runners
  namespace: arc-runners
spec:
  interval: 30m
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.10.1"
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # GitHub organization - runners available to all repos
    githubConfigUrl: "https://github.com/pid1co"
    githubConfigSecret: github-app-secret

    # Runner scaling
    minRunners: 0
    maxRunners: 5

    # Kubernetes mode - rootless, each step runs as separate pod
    containerMode:
      type: kubernetes
      kubernetesModeWorkVolumeClaim:
        accessModes: ["ReadWriteOnce"]
        storageClassName: truenas-nfs
        resources:
          requests:
            storage: 5Gi

    # Runner pod template
    template:
      spec:
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:latest
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                memory: 4Gi
            volumeMounts:
              - name: build-cache
                mountPath: /home/runner/.cache
        volumes:
          - name: build-cache
            persistentVolumeClaim:
              claimName: arc-build-cache

    # Controller reference
    controllerServiceAccount:
      namespace: arc-systems
      name: arc-controller-gha-rs-controller
