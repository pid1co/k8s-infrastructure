---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword
spec:
  provider:
    onepasswordSDK:
      vault: homelab-k8s
      auth:
        serviceAccountSecretRef:
          name: onepassword-credentials
          namespace: external-secrets
          key: token
---
# Note: The onepassword-credentials secret must be created manually:
#
# kubectl create secret generic onepassword-credentials \
#   --namespace external-secrets \
#   --from-literal=token=<YOUR_1PASSWORD_SERVICE_ACCOUNT_TOKEN>
#
# To get a service account token:
# 1. Go to 1Password.com -> Settings -> Service Accounts
# 2. Create a new service account with access to the homelab-k8s vault
# 3. Copy the token and use it in the command above
