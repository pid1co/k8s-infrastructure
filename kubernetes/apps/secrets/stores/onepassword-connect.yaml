---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onepassword-connect
  namespace: external-secrets
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onepassword-connect
  template:
    metadata:
      labels:
        app: onepassword-connect
    spec:
      containers:
        - name: connect-api
          image: 1password/connect-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: OP_SESSION
              value: /home/opuser/.op/1password-credentials.json
          volumeMounts:
            - name: credentials
              mountPath: /home/opuser/.op
              readOnly: true
            - name: data
              mountPath: /home/opuser/.op/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
        - name: connect-sync
          image: 1password/connect-sync:latest
          ports:
            - containerPort: 8081
          env:
            - name: OP_SESSION
              value: /home/opuser/.op/1password-credentials.json
          volumeMounts:
            - name: credentials
              mountPath: /home/opuser/.op
              readOnly: true
            - name: data
              mountPath: /home/opuser/.op/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: credentials
          secret:
            secretName: onepassword-connect-credentials
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: onepassword-connect
  namespace: external-secrets
spec:
  selector:
    app: onepassword-connect
  ports:
    - name: api
      port: 8080
      targetPort: 8080
    - name: sync
      port: 8081
      targetPort: 8081
