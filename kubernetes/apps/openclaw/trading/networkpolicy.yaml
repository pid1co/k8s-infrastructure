---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-trading-egress
  namespace: openclaw-trading
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: openclaw
      app.kubernetes.io/instance: trading
  policyTypes:
    - Egress
    - Ingress
  ingress:
    # Only allow ingress from traefik namespace
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/component: ingress
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Anthropic API (api.anthropic.com)
    # Resolved IPs may change - use FQDN egress with Cilium if available
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    # Note: For strict IP-based egress, resolve these hosts and add specific CIDRs:
    # - api.anthropic.com
    # - api-fxtrade.oanda.com (OANDA)
    # - financialmodelingprep.com
    # - forexfactory.com
    #
    # Using Cilium CiliumNetworkPolicy with FQDN selectors is recommended:
    # toFQDNs:
    #   - matchName: "api.anthropic.com"
    #   - matchName: "api-fxtrade.oanda.com"
    #   - matchName: "financialmodelingprep.com"
    #   - matchName: "forexfactory.com"
