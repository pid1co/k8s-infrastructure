---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: clawshell-trading-config
  namespace: openclaw-trading
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: clawshell-trading-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.toml: |
          # ClawShell configuration for openclaw-trading
          # This file contains real API keys - NEVER expose to OpenClaw container
          version = "0.1.1"

          [server]
          listen = "0.0.0.0:8081"
          log_level = "info"

          # Virtual key to real key mappings
          [[keys]]
          name = "anthropic"
          virtual = "virtual-key-trading-anthropic"
          real = "{{ .anthropic_real_key }}"
          upstream = "https://api.anthropic.com"

          [[keys]]
          name = "fmp"
          virtual = "virtual-key-trading-fmp"
          real = "{{ .fmp_real_key }}"
          upstream = "https://financialmodelingprep.com"

          # DLP patterns - block sensitive data in outbound requests
          [[dlp.patterns]]
          name = "anthropic_api_key"
          regex = 'sk-ant-[a-zA-Z0-9_-]{40,}'
          action = "block"

          [[dlp.patterns]]
          name = "fmp_api_key"
          regex = '[a-zA-Z0-9]{32}'
          action = "block"

          [[dlp.patterns]]
          name = "credit_card"
          regex = '(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|6(?:011|5[0-9]{2})[0-9]{12})'
          action = "block"

          [[dlp.patterns]]
          name = "ssn"
          regex = '\d{3}-\d{2}-\d{4}'
          action = "block"

          [[dlp.patterns]]
          name = "aws_key"
          regex = 'AKIA[0-9A-Z]{16}'
          action = "block"

  data:
    - secretKey: anthropic_real_key
      remoteRef:
        key: ClawShell Trading Config/anthropic_real_key
    - secretKey: fmp_real_key
      remoteRef:
        key: ClawShell Trading Config/fmp_real_key
