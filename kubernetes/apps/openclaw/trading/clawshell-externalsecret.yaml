---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: clawshell-trading-config
  namespace: openclaw-trading
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: clawshell-trading-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.toml: |
          # ClawShell configuration for openclaw-trading
          # This file contains real API keys - NEVER expose to OpenClaw container

          [server]
          listen = "0.0.0.0:8081"
          log_level = "info"

          # Virtual key to real key mappings
          [keys]
          [keys.anthropic]
          virtual = "virtual-key-trading-anthropic"
          real = "{{ .anthropic_real_key }}"
          upstream = "https://api.anthropic.com"

          [keys.oanda]
          virtual = "virtual-key-trading-oanda"
          real = "{{ .oanda_real_key }}"
          upstream = "https://api-fxtrade.oanda.com"

          [keys.fmp]
          virtual = "virtual-key-trading-fmp"
          real = "{{ .fmp_real_key }}"
          upstream = "https://financialmodelingprep.com"

          # DLP patterns - block or redact sensitive data in outbound requests
          [[dlp.patterns]]
          name = "oanda_account_number"
          pattern = '\b\d{3}-\d{3}-\d{7}-\d{3}\b'
          action = "block"
          message = "OANDA account number detected - request blocked"

          [[dlp.patterns]]
          name = "anthropic_api_key"
          pattern = 'sk-ant-[a-zA-Z0-9_-]{40,}'
          action = "block"
          message = "Anthropic API key pattern detected - request blocked"

          [[dlp.patterns]]
          name = "fmp_api_key"
          pattern = '\b[a-zA-Z0-9]{32}\b'
          action = "redact"
          replacement = "[REDACTED_API_KEY]"

          [[dlp.patterns]]
          name = "credit_card"
          pattern = '\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|6(?:011|5[0-9]{2})[0-9]{12})\b'
          action = "block"
          message = "Credit card number detected - request blocked"

          [[dlp.patterns]]
          name = "ssn"
          pattern = '\b\d{3}-\d{2}-\d{4}\b'
          action = "block"
          message = "SSN pattern detected - request blocked"

          [[dlp.patterns]]
          name = "aws_key"
          pattern = 'AKIA[0-9A-Z]{16}'
          action = "block"
          message = "AWS access key detected - request blocked"

  data:
    - secretKey: anthropic_real_key
      remoteRef:
        key: ClawShell Trading Config
        property: anthropic_real_key
    - secretKey: oanda_real_key
      remoteRef:
        key: ClawShell Trading Config
        property: oanda_real_key
    - secretKey: fmp_real_key
      remoteRef:
        key: ClawShell Trading Config
        property: fmp_real_key
