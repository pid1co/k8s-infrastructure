---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: openclaw-trading-data
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/user/appdata/openclaw-trading/data
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: Exists
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: openclaw-trading-workspace
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/user/appdata/openclaw-trading/workspace
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: Exists
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-trading-data
  namespace: openclaw-trading
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: openclaw-trading-data
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-trading-workspace
  namespace: openclaw-trading
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: openclaw-trading-workspace
  resources:
    requests:
      storage: 10Gi
