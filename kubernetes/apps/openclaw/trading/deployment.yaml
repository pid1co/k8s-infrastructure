---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-trading
  namespace: openclaw-trading
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/instance: trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
      app.kubernetes.io/instance: trading
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
        app.kubernetes.io/instance: trading
    spec:
      serviceAccountName: openclaw-trading
      imagePullSecrets:
        - name: ghcr-credentials
      initContainers:
        - name: init-config
          image: busybox
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /openclaw-data/.openclaw
              chown -R 1000:1000 /openclaw-data/.openclaw
              chmod 755 /openclaw-data/.openclaw
              if [ ! -f /openclaw-data/.openclaw/openclaw.json ]; then
                cp /config-template/openclaw.json /openclaw-data/.openclaw/openclaw.json
                chown 1000:1000 /openclaw-data/.openclaw/openclaw.json
                echo "Config initialised from ConfigMap"
              else
                echo "Config already exists, skipping"
              fi
          volumeMounts:
            - name: openclaw-config-template
              mountPath: /config-template
            - name: openclaw-data
              mountPath: /openclaw-data
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
            # Virtual key - ClawShell swaps for real key
            - name: ANTHROPIC_API_KEY
              value: "virtual-key-trading-anthropic"
            # Route Anthropic API calls through ClawShell proxy
            - name: ANTHROPIC_BASE_URL
              value: "http://localhost:8081/proxy/anthropic"
            # FMP uses real key directly (ClawShell only supports LLM providers)
            - name: FMP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-trading-secrets
                  key: fmp-api-key
            # Telegram (real token - does not go through ClawShell)
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-trading-secrets
                  key: telegram-bot-token
            # Pushover (real tokens)
            - name: PUSHOVER_USER_KEY
              valueFrom:
                secretKeyRef:
                  name: pushover-secrets
                  key: user-key
            - name: PUSHOVER_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pushover-secrets
                  key: app-token
            - name: CHROMIUM_ENABLED
              value: "true"
            - name: CHROMIUM_URL
              value: "http://localhost:3000"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: openclaw-data
              mountPath: /home/node
          # Note: openclaw container has NO access to clawshell-config volume

        - name: clawshell
          image: ghcr.io/pid1co/clawshell:latest
          args: ["-c", "/etc/clawshell/config.toml"]
          ports:
            - name: proxy
              containerPort: 8081
          env:
            - name: CLAWSHELL_CONFIG
              value: "/etc/clawshell/config.toml"
            - name: CLAWSHELL_LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: clawshell-config
              mountPath: /etc/clawshell
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5

        - name: chromium
          image: browserless/chrome:latest
          ports:
            - name: chromium
              containerPort: 3000
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 1Gi

      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: openclaw-trading-workspace
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-trading-data
        - name: clawshell-config
          secret:
            secretName: clawshell-trading-config
        - name: openclaw-config-template
          configMap:
            name: openclaw-trading-config
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-trading-workspace
  namespace: openclaw-trading
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-nfs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-trading-data
  namespace: openclaw-trading
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-nfs
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-trading
  namespace: openclaw-trading
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-trading
  namespace: openclaw-trading
spec:
  selector:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/instance: trading
  ports:
    - name: http
      port: 8080
      targetPort: http
