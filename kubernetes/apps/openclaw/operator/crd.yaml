---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openclawinstances.openclaw.io
spec:
  group: openclaw.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - model
              properties:
                model:
                  type: string
                  description: Claude model to use (e.g., claude-opus-4-6, claude-sonnet-4-6)
                chromiumEnabled:
                  type: boolean
                  default: false
                  description: Enable Chromium browser for automation
                egressPolicy:
                  type: string
                  enum: ["restricted", "general"]
                  default: "restricted"
                  description: Egress policy for network access
                allowedEgressHosts:
                  type: array
                  items:
                    type: string
                  description: List of allowed egress hosts (for restricted policy)
                sidecars:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      image:
                        type: string
                      args:
                        type: array
                        items:
                          type: string
                replicas:
                  type: integer
                  default: 1
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                readyReplicas:
                  type: integer
                lastUpdated:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Chromium
          type: boolean
          jsonPath: .spec.chromiumEnabled
        - name: Egress
          type: string
          jsonPath: .spec.egressPolicy
        - name: Phase
          type: string
          jsonPath: .status.phase
  scope: Namespaced
  names:
    plural: openclawinstances
    singular: openclawinstance
    kind: OpenClawInstance
    shortNames:
      - oci
      - openclaw
