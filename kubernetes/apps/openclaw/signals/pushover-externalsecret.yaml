---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pushover-secrets
  namespace: openclaw-signals
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: pushover-secrets
    creationPolicy: Owner
  data:
    - secretKey: user-key
      remoteRef:
        key: Pushover
        property: user_key
    - secretKey: app-token
      remoteRef:
        key: Pushover
        property: app_token
