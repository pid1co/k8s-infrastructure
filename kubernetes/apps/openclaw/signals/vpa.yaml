---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: openclaw-signals
  namespace: openclaw-signals
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: openclaw-signals
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: openclaw
        minAllowed:
          cpu: 50m
          memory: 128Mi
        maxAllowed:
          cpu: 500m
          memory: 1Gi
