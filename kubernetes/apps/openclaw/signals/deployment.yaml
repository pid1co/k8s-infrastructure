---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-signals
  namespace: openclaw-signals
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/instance: signals
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
      app.kubernetes.io/instance: signals
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
        app.kubernetes.io/instance: signals
    spec:
      serviceAccountName: openclaw-signals
      initContainers:
        - name: init-config
          image: busybox
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /openclaw-data/.openclaw
              if [ ! -f /openclaw-data/.openclaw/openclaw.json ]; then
                cp /config-template/openclaw.json /openclaw-data/.openclaw/openclaw.json
                chown 1000:1000 /openclaw-data/.openclaw/openclaw.json
                echo "Config initialised from ConfigMap"
              else
                echo "Config already exists, skipping"
              fi
          volumeMounts:
            - name: openclaw-config-template
              mountPath: /config-template
            - name: openclaw-data
              mountPath: /openclaw-data
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
            # Real keys directly - no ClawShell on signals instance
            # NetworkPolicy provides protection by restricting egress
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-signals-secrets
                  key: anthropic-api-key
            - name: FMP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-signals-secrets
                  key: fmp-api-key
            # Telegram bot token
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-signals-secrets
                  key: telegram-bot-token
            # Pushover (real tokens)
            - name: PUSHOVER_USER_KEY
              valueFrom:
                secretKeyRef:
                  name: pushover-secrets
                  key: user-key
            - name: PUSHOVER_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pushover-secrets
                  key: app-token
            - name: CHROMIUM_ENABLED
              value: "false"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: openclaw-data
              mountPath: /home/node
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: openclaw-signals-workspace
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-signals-data
        - name: openclaw-config-template
          configMap:
            name: openclaw-signals-config
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-signals-workspace
  namespace: openclaw-signals
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-nfs
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-signals-data
  namespace: openclaw-signals
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-nfs
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-signals
  namespace: openclaw-signals
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-signals
  namespace: openclaw-signals
spec:
  selector:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/instance: signals
  ports:
    - name: http
      port: 8080
      targetPort: http
