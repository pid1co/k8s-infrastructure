---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-signals-egress
  namespace: openclaw-signals
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: openclaw
      app.kubernetes.io/instance: signals
  policyTypes:
    - Egress
    - Ingress
  ingress:
    # Only allow ingress from traefik namespace
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/component: ingress
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Tight egress allowlist - only Anthropic and FMP
    # Note: Using FQDN selectors with Cilium is preferred
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    # For strict enforcement, use CiliumNetworkPolicy with FQDN:
    # toFQDNs:
    #   - matchName: "api.anthropic.com"
    #   - matchName: "financialmodelingprep.com"
