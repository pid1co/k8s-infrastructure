---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-signals-secrets
  namespace: openclaw-signals
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw-signals-secrets
    creationPolicy: Owner
  data:
    # Real keys - no ClawShell on signals instance
    - secretKey: anthropic-api-key
      remoteRef:
        key: OpenClaw Signals
        property: anthropic_api_key
    - secretKey: fmp-api-key
      remoteRef:
        key: OpenClaw Signals
        property: fmp_api_key
    - secretKey: telegram-bot-token
      remoteRef:
        key: OpenClaw Signals
        property: telegram_bot_token
