---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: openclaw-signals-data
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/user/appdata/openclaw-signals/data
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: Exists
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: openclaw-signals-workspace
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/user/appdata/openclaw-signals/workspace
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: Exists
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-signals-data
  namespace: openclaw-signals
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: openclaw-signals-data
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-signals-workspace
  namespace: openclaw-signals
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: openclaw-signals-workspace
  resources:
    requests:
      storage: 5Gi
