---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openclaw-personal-secrets
  namespace: openclaw-personal
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw-personal-secrets
    creationPolicy: Owner
  data:
    # Telegram bot token - real token, does not go through ClawShell
    - secretKey: telegram-bot-token
      remoteRef:
        key: OpenClaw Personal
        property: telegram_bot_token
