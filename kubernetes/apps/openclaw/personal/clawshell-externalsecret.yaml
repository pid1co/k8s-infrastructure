---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: clawshell-personal-config
  namespace: openclaw-personal
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: clawshell-personal-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.toml: |
          # ClawShell configuration for openclaw-personal
          version = "0.1.1"
          log_level = "info"

          [server]
          host = "0.0.0.0"
          port = 8081

          [upstream]
          anthropic_base_url = "https://api.anthropic.com"

          [[keys]]
          provider = "anthropic"
          virtual_key = "virtual-key-personal-anthropic"
          real_key = "{{ .anthropic_real_key }}"

          [dlp]
          scan_responses = false
          patterns = [
            { name = "anthropic_key", regex = 'sk-ant-[a-zA-Z0-9\-_]{40,}', action = "block" },
            { name = "oanda_key",     regex = '[0-9a-f]{32}-[0-9a-f]{16}',   action = "block" },
            { name = "fmp_key",       regex = '[A-Za-z0-9]{32}',             action = "redact" },
            { name = "ssn",           regex = '\b\d{3}-\d{2}-\d{4}\b',       action = "redact" },
            { name = "visa_card",     regex = '\b4[0-9]{12}(?:[0-9]{3})?\b', action = "redact" },
            { name = "credit_card",   regex = '\b3[47][0-9]{13}\b',          action = "redact" },
          ]

  data:
    - secretKey: anthropic_real_key
      remoteRef:
        key: ClawShell Personal Config/anthropic_real_key
