---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: clawshell-personal-config
  namespace: openclaw-personal
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: clawshell-personal-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.toml: |
          # ClawShell configuration for openclaw-personal
          version = "0.1.1"
          log_level = "info"

          [server]
          host = "0.0.0.0"
          port = 8081

          [upstream]
          anthropic_base_url = "https://api.anthropic.com"

          [[keys]]
          provider = "anthropic"
          virtual_key = "virtual-key-personal-anthropic"
          real_key = "{{ .anthropic_real_key }}"

  data:
    - secretKey: anthropic_real_key
      remoteRef:
        key: ClawShell Personal Config/anthropic_real_key
