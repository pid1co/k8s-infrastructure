---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: clawshell-personal-config
  namespace: openclaw-personal
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: clawshell-personal-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.toml: |
          # ClawShell configuration for openclaw-personal
          # This file contains real API keys - NEVER expose to OpenClaw container
          version = "0.1.1"

          [server]
          host = "0.0.0.0"
          port = 8081

          # Virtual key to real key mappings
          [[keys]]
          provider = "anthropic"
          virtual_key = "virtual-key-personal-anthropic"
          real_key = "{{ .anthropic_real_key }}"

          # DLP patterns - block sensitive data in outbound requests
          [[dlp.patterns]]
          name = "anthropic_api_key"
          regex = 'sk-ant-[a-zA-Z0-9_-]{40,}'
          action = "block"

          [[dlp.patterns]]
          name = "credit_card"
          regex = '(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|6(?:011|5[0-9]{2})[0-9]{12})'
          action = "block"

          [[dlp.patterns]]
          name = "ssn"
          regex = '\d{3}-\d{2}-\d{4}'
          action = "block"

          [[dlp.patterns]]
          name = "aws_key"
          regex = 'AKIA[0-9A-Z]{16}'
          action = "block"

  data:
    - secretKey: anthropic_real_key
      remoteRef:
        key: ClawShell Personal Config/anthropic_real_key
