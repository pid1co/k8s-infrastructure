---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-personal-config
  namespace: openclaw-personal
data:
  openclaw.json: |
    {
      "models": {
        "providers": {
          "anthropic": {
            "baseUrl": "http://localhost:8082",
            "api": "anthropic-messages",
            "models": [
              {"name": "claude-sonnet-4-6", "id": "claude-sonnet-4-6"}
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": "anthropic/claude-sonnet-4-6",
          "contextPruning": {
            "mode": "cache-ttl",
            "ttl": "1h"
          },
          "compaction": {
            "mode": "safeguard"
          },
          "heartbeat": {
            "every": "30m"
          },
          "maxConcurrent": 4,
          "subagents": {
            "maxConcurrent": 8
          }
        }
      },
      "messages": {
        "ackReactionScope": "group-mentions"
      },
      "commands": {
        "native": "auto",
        "nativeSkills": "auto",
        "restart": true,
        "ownerDisplay": "raw"
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "dmPolicy": "pairing",
          "groupPolicy": "allowlist",
          "streaming": "partial"
        }
      }
    }
