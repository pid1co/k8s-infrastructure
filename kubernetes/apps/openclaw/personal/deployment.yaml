---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-personal
  namespace: openclaw-personal
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/instance: personal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
      app.kubernetes.io/instance: personal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
        app.kubernetes.io/instance: personal
    spec:
      serviceAccountName: openclaw-personal
      imagePullSecrets:
        - name: ghcr-credentials
      initContainers:
        - name: init-config
          image: busybox
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /openclaw-data/.openclaw
              chown -R 1000:1000 /openclaw-data/.openclaw
              chmod 755 /openclaw-data/.openclaw
              if [ ! -f /openclaw-data/.openclaw/openclaw.json ]; then
                cp /config-template/openclaw.json /openclaw-data/.openclaw/openclaw.json
                chown 1000:1000 /openclaw-data/.openclaw/openclaw.json
                echo "Config initialised from ConfigMap"
              else
                echo "Config already exists, skipping"
              fi
          volumeMounts:
            - name: openclaw-config-template
              mountPath: /config-template
            - name: openclaw-data
              mountPath: /openclaw-data
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
            # Virtual key only - ClawShell swaps for real key
            - name: ANTHROPIC_API_KEY
              value: "virtual-key-personal-anthropic"
            # Route API calls through nginx->ClawShell proxy
            - name: ANTHROPIC_BASE_URL
              value: "http://localhost:8082"
            # Telegram (real token - does not go through ClawShell)
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-personal-secrets
                  key: telegram-bot-token
            # Pushover (real tokens)
            - name: PUSHOVER_USER_KEY
              valueFrom:
                secretKeyRef:
                  name: pushover-secrets
                  key: user-key
            - name: PUSHOVER_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pushover-secrets
                  key: app-token
            - name: CHROMIUM_ENABLED
              value: "true"
            - name: CHROMIUM_URL
              value: "http://localhost:3000"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: openclaw-data
              mountPath: /home/node
          # Note: openclaw container has NO access to clawshell-config volume

        - name: clawshell
          image: ghcr.io/pid1co/clawshell:latest
          args: ["-c", "/etc/clawshell/config.toml"]
          ports:
            - name: proxy
              containerPort: 8081
          env:
            - name: CLAWSHELL_CONFIG
              value: "/etc/clawshell/config.toml"
            - name: CLAWSHELL_LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: clawshell-config
              mountPath: /etc/clawshell
              readOnly: true
          # Note: ClawShell doesn't have built-in health endpoints
          # Probes removed - container stability monitored via restarts

        - name: chromium
          image: browserless/chrome:latest
          ports:
            - name: chromium
              containerPort: 3000
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 1Gi

        - name: nginx-proxy
          image: nginx:alpine
          ports:
            - name: nginx
              containerPort: 8082
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true

      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: openclaw-personal-workspace
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-personal-data
        - name: clawshell-config
          secret:
            secretName: clawshell-personal-config
        - name: openclaw-config-template
          configMap:
            name: openclaw-personal-config
        - name: nginx-config
          configMap:
            name: nginx-header-transform
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-personal-workspace
  namespace: openclaw-personal
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-nfs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-personal-data
  namespace: openclaw-personal
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-nfs
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-personal
  namespace: openclaw-personal
---
# ClusterRole for read-only k8s access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-personal-readonly
rules:
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps", "batch", "extensions", "networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io", "kustomize.toolkit.fluxcd.io", "source.toolkit.fluxcd.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-personal-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-personal-readonly
subjects:
  - kind: ServiceAccount
    name: openclaw-personal
    namespace: openclaw-personal
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-personal
  namespace: openclaw-personal
spec:
  selector:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/instance: personal
  ports:
    - name: http
      port: 8080
      targetPort: http
