---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-personal
  namespace: openclaw-personal
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/instance: personal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
      app.kubernetes.io/instance: personal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
        app.kubernetes.io/instance: personal
    spec:
      serviceAccountName: openclaw-personal
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          env:
            - name: OPENCLAW_MODEL
              value: "claude-sonnet-4-6"
            # Virtual key only - ClawShell swaps for real key
            - name: ANTHROPIC_API_KEY
              value: "virtual-key-personal-anthropic"
            # Route API calls through ClawShell proxy
            - name: ANTHROPIC_BASE_URL
              value: "http://localhost:8081/proxy/anthropic"
            # Telegram (real token - does not go through ClawShell)
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-personal-secrets
                  key: telegram-bot-token
            # Pushover (real tokens)
            - name: PUSHOVER_USER_KEY
              valueFrom:
                secretKeyRef:
                  name: pushover-secrets
                  key: user-key
            - name: PUSHOVER_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pushover-secrets
                  key: app-token
            - name: CHROMIUM_ENABLED
              value: "true"
            - name: CHROMIUM_URL
              value: "http://localhost:3000"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          # Note: openclaw container has NO access to clawshell-config volume

        - name: clawshell
          image: ghcr.io/clawshell/clawshell:latest
          ports:
            - name: proxy
              containerPort: 8081
          env:
            - name: CLAWSHELL_CONFIG
              value: "/etc/clawshell/config.toml"
            - name: CLAWSHELL_LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: clawshell-config
              mountPath: /etc/clawshell
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5

        - name: chromium
          image: browserless/chromium:latest
          ports:
            - name: chromium
              containerPort: 3000
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 1Gi

        # kubernetes-mcp-server sidecar for k8s access
        - name: kubernetes-mcp
          image: ghcr.io/strowk/mcp-k8s-go:latest
          args:
            - "--read-only"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi

      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: openclaw-personal-workspace
        - name: clawshell-config
          secret:
            secretName: clawshell-personal-config
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-personal-workspace
  namespace: openclaw-personal
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-nfs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-personal
  namespace: openclaw-personal
---
# ClusterRole for read-only k8s access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-personal-readonly
rules:
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps", "batch", "extensions", "networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io", "kustomize.toolkit.fluxcd.io", "source.toolkit.fluxcd.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-personal-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-personal-readonly
subjects:
  - kind: ServiceAccount
    name: openclaw-personal
    namespace: openclaw-personal
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-personal
  namespace: openclaw-personal
spec:
  selector:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/instance: personal
  ports:
    - name: http
      port: 8080
      targetPort: http
