---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "39.0.7"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    deployment:
      replicas: 1

    # Use Tailscale loadBalancer
    service:
      type: LoadBalancer
      annotations:
        tailscale.com/hostname: traefik
        tailscale.com/tags: tag:k8s-operator
      loadBalancerClass: tailscale

    # Entry points
    ports:
      web:
        port: 80
        exposedPort: 80
        protocol: TCP
        # Redirect HTTP to HTTPS
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
      websecure:
        port: 443
        exposedPort: 443
        protocol: TCP
        http:
          tls:
            enabled: true

    # Enable IngressRoute CRD
    ingressRoute:
      dashboard:
        enabled: false

    # Provider configuration
    providers:
      kubernetesIngress:
        enabled: true
        publishedService:
          enabled: true
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true

    # TLS store for wildcard cert
    tlsStore:
      default:
        defaultCertificate:
          secretName: wildcard-ts-tls

    # Logs
    logs:
      general:
        level: INFO
      access:
        enabled: true

    # Security
    securityContext:
      capabilities:
        drop: [ALL]
      readOnlyRootFilesystem: true
      runAsGroup: 65532
      runAsNonRoot: true
      runAsUser: 65532

    # Resources
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi
