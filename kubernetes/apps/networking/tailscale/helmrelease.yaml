---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 30m
  chart:
    spec:
      chart: tailscale-operator
      version: "1.78.3"
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: tailscale-operator-credentials
      valuesKey: oauth_client_id
      targetPath: oauth.clientId
    - kind: Secret
      name: tailscale-operator-credentials
      valuesKey: oauth_client_secret
      targetPath: oauth.clientSecret
  values:
    # Operator configuration
    operatorConfig:
      hostname: k8s-operator
      defaultTags:
        - tag:k8s-operator

    # API server proxy (for kubectl via Tailscale)
    apiServerProxyConfig:
      mode: "false"

    # Resources
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
