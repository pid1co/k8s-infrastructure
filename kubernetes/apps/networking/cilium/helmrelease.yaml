---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: "1.19.2"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    operator:
      replicas: 1

    # IPAM
    ipam:
      mode: kubernetes

    # kube-proxy replacement
    kubeProxyReplacement: true
    k8sServiceHost: 192.168.168.10
    k8sServicePort: 6443

    # Hubble observability
    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true

    # SocketLB for Tailscale compatibility
    socketLB:
      hostNamespaceOnly: true

    # Use iptables masquerading with route-source support
    bpf:
      masquerade: false

    # Use correct source IP based on route
    enableMasqueradeRouteSource: true

    # Devices
    devices:
      - ens18
      - enp3s0np0

    # Native routing
    routingMode: native
    autoDirectNodeRoutes: true
    ipv4NativeRoutingCIDR: 10.42.0.0/16

    # Performance optimizations
    endpointRoutes:
      enabled: true
