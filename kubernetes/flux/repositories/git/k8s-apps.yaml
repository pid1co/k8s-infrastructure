---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: k8s-apps
  namespace: flux-system
spec:
  interval: 1h
  url: ssh://git@github.com/pid1co/k8s-apps.git
  ref:
    branch: main
  secretRef:
    name: github-deploy-key
---
# Note: Replace pid1co with your actual GitHub username
# The github-deploy-key secret must be created with a deploy key that has
# read access to the private k8s-apps repository.
#
# Create the secret with:
# flux create secret git github-deploy-key \
#   --url=ssh://git@github.com/pid1co/k8s-apps.git \
#   --private-key-file=./deploy-key
