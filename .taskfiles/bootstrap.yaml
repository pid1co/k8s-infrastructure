# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  # Dynamically resolve primary IP
  NODE_IP:
    sh: hostname -I | awk '{print $1}'

tasks:
  k3s:
    desc: Install k3s with flannel and kube-proxy disabled
    cmds:
      - |
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server" sh -s - \
          --disable=flannel \
          --disable-kube-proxy \
          --disable=traefik \
          --disable=servicelb \
          --disable=local-storage \
          --disable=metrics-server \
          --flannel-backend=none \
          --cluster-cidr=10.42.0.0/16 \
          --service-cidr=10.43.0.0/16 \
          --write-kubeconfig-mode=644 \
          --tls-san={{.NODE_IP}} \
          --tls-san=192.168.168.10 \
          --node-ip={{.NODE_IP}} \
          --kubelet-arg="--node-ip={{.NODE_IP}}"
      - mkdir -p {{.ROOT_DIR}}
      - sudo cp /etc/rancher/k3s/k3s.yaml {{.ROOT_DIR}}/kubeconfig
      - sudo chown $USER:$USER {{.ROOT_DIR}}/kubeconfig
      - sed -i 's/127.0.0.1/{{.NODE_IP}}/g' {{.ROOT_DIR}}/kubeconfig
    status:
      - test -f /etc/rancher/k3s/k3s.yaml

  cilium:
    desc: Install Cilium CNI with eBPF and kube-proxy replacement
    vars:
      CILIUM_VERSION: "1.16.5"
    cmds:
      - |
        helm repo add cilium https://helm.cilium.io/ || true
        helm repo update cilium
      - |
        helm upgrade --install cilium cilium/cilium \
          --version {{.CILIUM_VERSION}} \
          --namespace kube-system \
          --set operator.replicas=1 \
          --set ipam.mode=kubernetes \
          --set kubeProxyReplacement=true \
          --set k8sServiceHost={{.NODE_IP}} \
          --set k8sServicePort=6443 \
          --set hubble.enabled=true \
          --set hubble.relay.enabled=true \
          --set hubble.ui.enabled=true \
          --set socketLB.hostNamespaceOnly=true \
          --set bpf.masquerade=true \
          --set egressMasqueradeInterfaces=ens18 \
          --set routingMode=native \
          --set autoDirectNodeRoutes=true \
          --set ipv4NativeRoutingCIDR=10.42.0.0/16 \
          --set installNoConntrackIptablesRules=true \
          --set endpointRoutes.enabled=true
      - cilium status --wait
    deps:
      - k3s

  namespaces:
    desc: Apply all namespace definitions
    cmds:
      - kubectl apply -f {{.ROOT_DIR}}/kubernetes/bootstrap/namespaces.yaml
    deps:
      - cilium

  onepassword:
    desc: Bootstrap 1Password ESO secret (manual step)
    cmds:
      - |
        echo "Create the 1Password service account credentials secret:"
        echo ""
        echo "kubectl create namespace external-secrets"
        echo ""
        echo "kubectl create secret generic onepassword-credentials \\"
        echo "  --namespace external-secrets \\"
        echo "  --from-literal=token=<YOUR_1PASSWORD_SERVICE_ACCOUNT_TOKEN>"
        echo ""
        echo "Replace <YOUR_1PASSWORD_SERVICE_ACCOUNT_TOKEN> with your actual token."
    silent: true

  flux:
    desc: Bootstrap Flux CD
    vars:
      GITHUB_USER: '{{.GITHUB_USER | default "your-github-username"}}'
      GITHUB_REPO: '{{.GITHUB_REPO | default "k8s-infrastructure"}}'
    cmds:
      - |
        flux bootstrap github \
          --owner={{.GITHUB_USER}} \
          --repository={{.GITHUB_REPO}} \
          --branch=main \
          --path=kubernetes/flux/config \
          --personal
    deps:
      - namespaces

  all:
    desc: Run all bootstrap tasks in correct order
    cmds:
      - task: k3s
      - task: cilium
      - task: namespaces
      - echo "Next steps:"
      - echo "1. Run 'task bootstrap:onepassword' and follow instructions"
      - echo "2. Set GITHUB_USER and GITHUB_REPO environment variables"
      - echo "3. Run 'task bootstrap:flux' to bootstrap Flux"
