# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  encrypt:
    desc: SOPS encrypt a file (var FILE required)
    cmds:
      - sops --encrypt --in-place {{.FILE}}
    requires:
      vars:
        - FILE

  decrypt:
    desc: SOPS decrypt a file (var FILE required)
    cmds:
      - sops --decrypt --in-place {{.FILE}}
    requires:
      vars:
        - FILE

  view:
    desc: View decrypted SOPS file (var FILE required)
    cmds:
      - sops --decrypt {{.FILE}}
    requires:
      vars:
        - FILE

  edit:
    desc: Edit SOPS encrypted file (var FILE required)
    cmds:
      - sops {{.FILE}}
    requires:
      vars:
        - FILE

  verify:
    desc: Verify all ExternalSecrets are synced
    cmds:
      - |
        echo "Checking ExternalSecret sync status..."
        kubectl get externalsecrets -A -o jsonpath='{range .items[*]}{.metadata.namespace}/{.metadata.name}: {.status.conditions[?(@.type=="Ready")].status}{"\n"}{end}'

  list:
    desc: List all secrets (names only, no values)
    cmds:
      - kubectl get secrets -A --no-headers | awk '{print $1"/"$2}'

  1password:test:
    desc: Test 1Password ClusterSecretStore connection
    cmds:
      - |
        echo "ClusterSecretStore Status:"
        kubectl get clustersecretstore onepassword -o jsonpath='{.status.conditions[0]}' | jq .
      - |
        echo ""
        echo "ExternalSecrets Summary:"
        kubectl get externalsecrets -A -o custom-columns='NAMESPACE:.metadata.namespace,NAME:.metadata.name,READY:.status.conditions[?(@.type=="Ready")].status,REASON:.status.conditions[?(@.type=="Ready")].reason'
